AWSTemplateFormatVersion: "2010-09-09"
Description: CodeBuddy final project - API Gateway, Lambda, IAM for Bedrock PR review automation.

Parameters:
  ProjectName:
    Type: String
    Default: codebuddy
  CodeBucket:
    Type: String
    Description: S3 bucket containing Lambda zip artifacts.
  OrchestratorCodeKey:
    Type: String
    Description: S3 key for orchestrator Lambda zip.
  ToolsCodeKey:
    Type: String
    Description: S3 key for all-tools Lambda zip.
  GitHubToken:
    Type: String
    NoEcho: true
    Description: GitHub token with repo permission.
  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Default: ""
    Description: Slack incoming webhook URL. Leave empty to disable Slack in direct mode.
  SlackChannel:
    Type: String
    Default: "#code-review"
  AgentId:
    Type: String
    Default: ""
    Description: Optional Bedrock Agent ID for agent mode.
  AgentAliasId:
    Type: String
    Default: ""
    Description: Optional Bedrock Agent Alias ID for agent mode.
  CodeBuddyMode:
    Type: String
    Default: direct
    AllowedValues:
      - direct
      - agent
    Description: direct uses Lambda static review. agent invokes Bedrock Agent.

Resources:
  CodeBuddyLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CodeBuddyBedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Retrieve
                  - bedrock:RetrieveAndGenerate
                  - bedrock:InvokeAgent
                Resource: "*"

  OrchestratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-orchestrator"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CodeBuddyLambdaRole.Arn
      Timeout: 60
      MemorySize: 512
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref OrchestratorCodeKey
      Environment:
        Variables:
          GITHUB_TOKEN: !Ref GitHubToken
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          SLACK_CHANNEL: !Ref SlackChannel
          AGENT_ID: !Ref AgentId
          AGENT_ALIAS_ID: !Ref AgentAliasId
          CODEBUDDY_MODE: !Ref CodeBuddyMode

  AllToolsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-all-tools"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CodeBuddyLambdaRole.Arn
      Timeout: 60
      MemorySize: 512
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref ToolsCodeKey
      Environment:
        Variables:
          GITHUB_TOKEN: !Ref GitHubToken
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          SLACK_CHANNEL: !Ref SlackChannel

  CodeBuddyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      EndpointConfiguration:
        Types:
          - REGIONAL

  ReviewResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ParentId: !GetAtt CodeBuddyApi.RootResourceId
      PathPart: review

  ReviewPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ResourceId: !Ref ReviewResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorLambda.Arn}/invocations"

  ReviewOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ResourceId: !Ref ReviewResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: "{\"statusCode\": 200}"
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OrchestratorLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CodeBuddyApi}/*/POST/review"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ReviewPostMethod
      - ReviewOptionsMethod
    Properties:
      RestApiId: !Ref CodeBuddyApi
      StageName: prod

  AllowBedrockInvokeTools:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AllToolsLambda
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

Outputs:
  ReviewApiUrl:
    Value: !Sub "https://${CodeBuddyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/review"
  OrchestratorLambdaName:
    Value: !Ref OrchestratorLambda
  AllToolsLambdaName:
    Value: !Ref AllToolsLambda
  AllToolsLambdaArn:
    Value: !GetAtt AllToolsLambda.Arn
